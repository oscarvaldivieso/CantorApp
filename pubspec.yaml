name: cantor_app
description: "CantorApp — Cantoral digital católico para Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Navegación
  go_router: ^14.2.0

  # Base de datos
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3

  # PDF
  pdf: ^3.11.0
  printing: ^5.13.0

  # Compartir
  share_plus: ^10.0.0

  # Fuentes
  google_fonts: ^6.2.1

  # Íconos
  flutter_vector_icons: ^2.0.0

  # Formato fecha
  intl: ^0.19.0

  # UUID
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - lib/assets/
